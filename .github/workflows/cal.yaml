name: Calculate Revision (AOSP Script Method)

on:
  workflow_dispatch:

env:
  ACTIONS_RUNNER_DEBUG: true
  ACTIONS_STEP_DEBUG: true
jobs:
  calculate:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Hybrid Repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Full history required for rev-list

      - name: Run AOSP Logic
        id: aosp_logic
        run: |
          set -euo pipefail
          git switch main || git switch -c main --track origin/main || true

          # 1. Defined checkpoint (revision, SHA)
          CHECKPOINT_REV=500000
          CHECKPOINT_SHA="173855f9b0bdfe45d71272596b510650bfc1ca33"

          # 2. Verify the checkpoint exists in this branch's history
          if ! git merge-base --is-ancestor "$CHECKPOINT_SHA" HEAD; then
            echo "Error: Checkpoint $CHECKPOINT_SHA not found in history." >&2
            exit 1
          fi

          # 3. Match AOSP's synthetic numbering exactly:
          #    git rev-list --count --first-parent ${base_sha}..${sha}
          #    --first-parent is required so merge commits don't inflate the count
          DIFF=$(git rev-list --count "$CHECKPOINT_SHA"..HEAD)

          # 4. Final calculation
          FINAL_REV=$((CHECKPOINT_REV + DIFF))

          echo "r_number=r${FINAL_REV}" >> "$GITHUB_OUTPUT"
          echo "diff=${DIFF}" >> "$GITHUB_OUTPUT"
          git fetch origin
          git switch main || git switch -c main --track origin/main || true
          git rev-list --count --all
          git rev-list --left-right --count origin/aosp...origin/ollvm
          git switch aosp || git switch -c aosp --track origin/aosp || true
          git rev-list --count --all
          git switch ollvm || git switch -c ollvm --track origin/ollvm || true
          git rev-list --count --all

      - name: Display Summary
        run: |
          {
            echo "### 🛠️ AOSP Script Logic Result"
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Base Checkpoint | \`r500000\` |"
            echo "| Commits since Checkpoint | \`${{ steps.aosp_logic.outputs.diff }}\` |"
            echo "| **Final AOSP Revision** | **${{ steps.aosp_logic.outputs.r_number }}** |"
            echo ""
            echo "Set \`_svn_revision = '${{ steps.aosp_logic.outputs.r_number }}'\` in \`android_version.py\`"
          } >> "$GITHUB_STEP_SUMMARY"
