name: Sync Hybrid LLVM 22.1.8

on:
  workflow_dispatch:

jobs:
  merge-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Hybrid Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # We need your local history to perform the merge

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch Single Tag from Upstream
        run: |
          # Add upstream but do NOT fetch anything yet
          git remote add upstream https://github.com/llvm/llvm-project.git
          
          # Fetch ONLY the specific tag needed (depth 1 keeps it small)
          # This prevents the "new tag" spam for version 8, 9, 10 etc.
          git fetch upstream tag llvmorg-22.1.8 --no-tags --depth 1

      - name: Merge 22.1.8 into Hybrid Branch
        run: |
          echo "Starting merge of official 22.1.8..."
          
          # Merge the specific tag we just fetched (available as FETCH_HEAD)
          # --allow-unrelated-histories is sometimes needed for shallow hybrid clones
          git merge FETCH_HEAD --no-ff \
            -m "Merge official LLVM 22.1.8" \
            -m "Source: https://github.com/llvm/llvm-project/releases/tag/llvmorg-22.1.8"

      - name: Push to Mirror
        run: |
          # Push the merged results back to your repo
          git push origin main
