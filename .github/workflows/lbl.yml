name: Exact Label Synchronization

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync-labels:
    name: Sync Labels from llvm/llvm-project
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔄 Smart Sync Labels (Throttled)
        uses: actions/github-script@v9
        with:
          script: |
            const sleep = (ms) => new Promise(r => setTimeout(r, ms));
            
            const upstreamOwner = 'llvm';
            const upstreamRepo = 'llvm-project';
            const targetOwner = context.repo.owner;
            const targetRepo = context.repo.repo;

            console.log("📥 Fetching labels...");
            const upstreamLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: upstreamOwner, repo: upstreamRepo, per_page: 100
            });
            const targetLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: targetOwner, repo: targetRepo, per_page: 100
            });

            const targetLabelMap = new Map(targetLabels.map(l => [l.name, l]));
            const upstreamLabelMap = new Map(upstreamLabels.map(l => [l.name, l]));

            // STEP 1: CREATE OR UPDATE
            for (const uLabel of upstreamLabels) {
              const tLabel = targetLabelMap.get(uLabel.name);
              const uDesc = uLabel.description || '';
              
              if (!tLabel) {
                console.log(`[CREATE] ${uLabel.name}`);
                await github.rest.issues.createLabel({
                  owner: targetOwner, repo: targetRepo,
                  name: uLabel.name, color: uLabel.color, description: uDesc
                });
                await sleep(1500); // 1.5s delay to avoid secondary rate limits
              } else if (tLabel.color !== uLabel.color || (tLabel.description || '') !== uDesc) {
                console.log(`[UPDATE] ${uLabel.name}`);
                await github.rest.issues.updateLabel({
                  owner: targetOwner, repo: targetRepo,
                  name: uLabel.name, color: uLabel.color, description: uDesc
                });
                await sleep(1500);
              }
            }

            // STEP 2: PRUNE
            for (const tLabel of targetLabels) {
              if (!upstreamLabelMap.has(tLabel.name)) {
                console.log(`[DELETE] ${tLabel.name}`);
                await github.rest.issues.deleteLabel({
                  owner: targetOwner, repo: targetRepo, name: tLabel.name
                });
                await sleep(1500);
              }
            }
            console.log("🎉 Sync complete!");
